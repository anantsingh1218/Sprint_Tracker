<div class="overlay">
  <div class="workitem">
    <div class="header">
      <div class="title-block">
        <div class="story-id">Task #{{ task.taskCode || 'New' }}</div>
        <input class="title" [(ngModel)]="task.title" placeholder="Enter title..." />
      </div>

      <div class="header-center">
        <button
          class="icon-btn"
          (click)="toggleAttachmentsView()"
          [class.active]="isAttachmentView"
          title="Attachments"
        >
          {{ !isAttachmentView ? 'Go to Attachments Page' : 'Back to Description Page' }}
        </button>
      </div>

      <button class="btn-close" (click)="closeOverlay()">✕</button>
    </div>

    <div class="body">
      <div class="left">
        @if (!isAttachmentView) {
          <label>Description</label>
          <textarea [(ngModel)]="task.body"></textarea>

          <div class="comments">
            <h4>Discussion</h4>

            <div class="comment" *ngFor="let c of task.commentsList">
              <b>{{ c.userCode || 'System' }}</b>
              <p>{{ c.text }}</p>
              <small>{{ c.createdAt | date: 'short' }}</small>
            </div>

            <div class="add-comment">
              <input [(ngModel)]="newComment" placeholder="Add comment..." />
              <button (click)="addComment()">Add</button>
            </div>
          </div>
        }

        @if (isAttachmentView) {
          <h4>Attachments</h4>

          <input type="file" multiple (change)="onFileSelected($event)" />

          <div class="selected-files" *ngIf="selectedFiles().length">
            <h5>Selected Files</h5>
            <div *ngFor="let file of selectedFiles()">To be uploaded : {{ file.name }}</div>
          </div>

          <button (click)="uploadFiles()">Upload</button>

          <div class="attachment-list">
            <div class="attachment" *ngFor="let file of attachments()">
              <a [href]="file.filename" target="_blank">
                {{ file.filename }}
              </a>

              <button class="remove-btn" (click)="deleteAttachment(file.filename)">X</button>
            </div>
          </div>
        }
      </div>

      <div class="right">
        <label>Story Code</label>
        <select [(ngModel)]="task.storyCode">
          <option [ngValue]="null">Select Story</option>
          <option *ngFor="let st of stories" [ngValue]="'S' + st.id">{{ st.title }}</option>
        </select>

        <label>Sprint Code</label>
        <select [(ngModel)]="task.sprintCode">
          <option [ngValue]="null">Select Sprint</option>
          <option *ngFor="let sp of sprints" [ngValue]="'SP' + sp.id">{{ sp.sprintName }}</option>
        </select>

        <label>Assigned To (User Code)</label>
        <select [(ngModel)]="task.userCode">
          <option [ngValue]="null">Unassigned</option>
          <option *ngFor="let u of users" [ngValue]="'U' + u.id">{{ u.username }}</option>
        </select>

        <label>Status</label>
        <select [(ngModel)]="task.taskstatus">
          <option value="OPEN">Open</option>
          <option value="IN_PROGRESS">In Progress</option>
          <option value="DONE">Done</option>
          <option value="CLOSED">Closed</option>
        </select>

        <label>Priority</label>
        <select [(ngModel)]="task.priority">
          <option value="LOW">Low</option>
          <option value="MEDIUM">Medium</option>
          <option value="HIGH">High</option>
          <option value="CRITICAL">Critical</option>
        </select>

        <label>Original Estimate (Hours)</label>
        <input type="number" [(ngModel)]="task.originalestimatehours" />

        <label>Remaining Estimate (Hours)</label>
        <input type="number" [(ngModel)]="task.remainingestimatehours" />
      </div>
    </div>
    <div class="footer">
      <button class="btn-save" (click)="saveTask()">Save</button>
      <button class="btn-cancel" (click)="closeOverlay()">Cancel</button>
    </div>
  </div>
</div>
