<div class="bug-header">
  <h2>Bugs</h2>
  <button (click)="openCreateBug()">+ Create Bug</button>
</div>

<div class="bug-grid">
  <div class="bug-card" *ngFor="let bug of bugs">

    <div (click)="openBug(bug)">
      <h3>{{ bug.title }}</h3>
      <p>{{ bug.description }}</p>
    </div>

    <p>
      {{ bug.comments || 'No comments available' }}
    </p>

    <div class="meta">
      <span>{{ bug.bugstatus }}</span>
      <span>{{ bug.priority }}</span>
      <span>{{ bug.remainingestimatehours }} hrs</span>
    </div>

    <button (click)="deleteBug(bug.id)">Delete</button>

  </div>
</div>

<app-bug
  *ngIf="isBugOpen"
  [bug]="selectedBug"
  (save)="saveBug($event)"
  (close)="closeBug()">
</app-bug>
