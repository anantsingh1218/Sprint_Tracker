<div class="backlog">

  <div class="toolbar">
    <h2>Backlog</h2>

    <button mat-raised-button color="primary"
      (click)="openCreate(WorkItemType.Feature)">
      + New Feature
    </button>
  </div>

  @for (feature of tree; track feature.id) {

    <mat-card class="feature">
      <div class="row">

        <span class="arrow" (click)="toggle(feature); $event.stopPropagation()">
          {{ feature.expanded ? '▼' : '▶' }}
        </span>

        <strong class="title" (click)="openEdit(feature)">
          {{ feature.title }}
        </strong>

        <button mat-icon-button [matMenuTriggerFor]="featureMenu">
          +
        </button>

        <mat-menu #featureMenu="matMenu">
          <button mat-menu-item
            (click)="openCreate(WorkItemType.Story, feature)">
            Add Story
          </button>
        </mat-menu>

      </div>

      @if (feature.expanded) {

        <div class="children">

          @for (story of feature.children; track story.id) {

            <mat-card class="story">

              <div class="row">

                <span class="arrow" (click)="toggle(story)">
                  {{ story.expanded ? '▼' : '▶' }}
                </span>

                <span class="title" (click)="openEdit(story)">
                  {{ story.title }}
                </span>

                <button mat-icon-button [matMenuTriggerFor]="storyMenu">
                  +
                </button>

                <mat-menu #storyMenu="matMenu">
                  <button mat-menu-item
                    (click)="openCreate(WorkItemType.Task, story)">
                    Add Task
                  </button>

                  <button mat-menu-item
                    (click)="openCreate(WorkItemType.Bug, story)">
                    Add Bug
                  </button>
                </mat-menu>

              </div>

            </mat-card>

          }

        </div>
      }
    </mat-card>

  }

</div>

<!-- OVERLAY -->
<app-feature
  *ngIf="overlayType === WorkItemType.Feature && selectedFeature"
  [feature]="selectedFeature"
  (save)="saveFeature($event)"
  (close)="closeOverlay()">
</app-feature>

<app-story
  *ngIf="overlayType !== WorkItemType.Feature && selectedStory"
  [story]="selectedStory"
  (save)="saveStory($event)"
  (close)="closeOverlay()">
</app-story>
