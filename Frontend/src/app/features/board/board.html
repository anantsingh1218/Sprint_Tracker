<div class="board">

  <!-- TODO -->
  <div class="column"
       cdkDropList
       [cdkDropListData]="todo"
       (cdkDropListDropped)="drop($event, 'todo')">

    <h3>To Do</h3>

    <div *ngFor="let item of todo"
         cdkDrag
         @fadeSlide>

      <mat-card class="card">
        <b>{{ item.type | uppercase }}</b><br />
        {{ item.title }}
      </mat-card>

    </div>
  </div>

  <!-- IN PROGRESS -->
  <div class="column"
       cdkDropList
       [cdkDropListData]="inProgress"
       (cdkDropListDropped)="drop($event, 'in-progress')">

    <h3>In Progress</h3>

    <div *ngFor="let item of inProgress"
         cdkDrag
         @fadeSlide>

      <mat-card class="card">
        <b>{{ item.type | uppercase }}</b><br />
        {{ item.title }}
      </mat-card>

    </div>
  </div>

  <!-- DONE -->
  <div class="column"
       cdkDropList
       [cdkDropListData]="done"
       (cdkDropListDropped)="drop($event, 'done')">

    <h3>Done</h3>

    <div *ngFor="let item of done"
         cdkDrag
         @fadeSlide>

      <mat-card class="card">
        <b>{{ item.type | uppercase }}</b><br />
        {{ item.title }}
      </mat-card>

    </div>
  </div>

</div>
