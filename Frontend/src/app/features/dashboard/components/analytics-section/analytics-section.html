<div class="dashboard-grid">

    <!-- Hero Burndown -->
    <section class="dashboard-card burndown-card">

        <app-burndown-card
            *ngIf="burndown"
            [burndown]="burndown">
        </app-burndown-card>

    </section>

    <!-- Sprint Velocity -->
    <section class="dashboard-card velocity-card">

        <app-velocity-card
            *ngIf="velocity"
            [velocity]="velocity">
        </app-velocity-card>

    </section>

    <!-- Team Capacity -->
    <section class="dashboard-card capacity-card">

        <app-team-capacity-card
            *ngIf="teamCapacity"
            [teamCapacity]="teamCapacity">
        </app-team-capacity-card>

    </section>

    <!-- Release Readiness -->
    <section class="dashboard-card release-card">

        <app-release-card
            *ngIf="releaseReadiness"
            [releaseReadiness]="releaseReadiness">
        </app-release-card>

    </section>

</div>
