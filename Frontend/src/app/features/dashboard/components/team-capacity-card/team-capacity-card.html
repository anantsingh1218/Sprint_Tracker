<div class="analytics-card" *ngIf="teamCapacity">

    <div class="card-header">
        <h3>👥 Team Capacity</h3>
    </div>

    <div class="member-count">

        {{ teamCapacity.availableMembers }}/{{ teamCapacity.totalMembers }}

    </div>

    <div class="progress-track">

        <div
            class="progress-fill"
            [style.width.%]="
                (teamCapacity.availableMembers / teamCapacity.totalMembers) * 100">
        </div>

    </div>

    <div class="stats">

        <div>
            <span>Available</span>
            <strong>{{ teamCapacity.availableMembers }}</strong>
        </div>

        <div>
            <span>Busy</span>
            <strong>{{ teamCapacity.busyMembers }}</strong>
        </div>

        <div>
            <span>Overloaded</span>
            <strong>{{ teamCapacity.overloadedMembers }}</strong>
        </div>

    </div>

</div>
