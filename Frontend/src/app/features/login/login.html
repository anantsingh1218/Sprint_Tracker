<div class="login-page">
  <div class="login-container">
    <div class="brand">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="brand-icon"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M13 10V3L4 14h7v7l9-11h-7z"
        />
      </svg>
      <h2>SprintLite</h2>
    </div>

    <p class="subtitle">Sign in to continue</p>

    <form (ngSubmit)="onLogin()">
      <div class="input-group">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="input-icon"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M16 12H8m8 0l-4 4m4-4l-4-4"
          />
        </svg>
        <input type="email" [(ngModel)]="email" name="email" placeholder="Email address" required />
      </div>

      <div class="input-group">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="input-icon"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2h-1V9a5 5 0 00-10 0v2H6a2 2 0 00-2 2v6a2 2 0 002 2z"
          />
        </svg>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Password"
          required
        />
      </div>

      <button type="submit">Login</button>

      @if (errorMessage()) {
        <h2 class="error-message">
          {{ errorMessage() }}
        </h2>
      }

      <a href="#" class="forgot">Forgot password?</a>
    </form>
  </div>
</div>
