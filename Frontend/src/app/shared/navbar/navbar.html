<div class="navbar">

  <!-- CENTER: Search -->
  <div class="center">
    <input type="text" placeholder="Search work items, sprints..." />
  </div>

  <!-- RIGHT: Actions -->
  <div class="right">

    @if (isProjectManager) {
      <button class="btn" (click)="navigateToRegister()">
        Register New User
      </button>
    }

    <!-- Profile Container -->
    <div class="profile-container">

      <div class="avatar" (click)="goToProfile()">
        @if (username) {
          {{ username[0] | uppercase }}
        } @else {
          A
        }
      </div>

      <div class="dropdown-menu">

        <div class="dropdown-item" (click)="goToProfile()">
          Profile
        </div>

        <div class="dropdown-item" (click)="logout()">
          Logout
        </div>

      </div>

    </div>

  </div>
</div>
